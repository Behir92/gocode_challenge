services:
  fashionhub:
    image: pocketaces2/fashionhub-demo-app:latest
    platform: linux/arm64
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/fashionhub/"]
      interval: 3s
      timeout: 3s
      retries: 10

  playwright-tests:
    build: .
    environment:
      - ENV=docker 
    depends_on:
      fashionhub:
        condition: service_healthy
    volumes:
      - ./playwright-report:/usr/src/app/playwright-report
      - ./test-results:/usr/src/app/test-results